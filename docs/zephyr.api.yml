    get:
      tags:
      - Test Cases
      summary: Get test cases (NextGen)
      description: |
        Retrieves all test cases. Query parameters can be used to filter the results.

        Use this endpoint for retrieving large volumes of test cases.

        Results are split in different pages, of size equal to the `limit` query parameter.
        To fetch the next page, use the `next` URL returned in the response.
        It should have the same parameters as the original request, with the updated value for `startAtId` parameter.
        Alternatively, the same request can be made with the `startAtId` parameter set to the `nextStartId` value
        returned in the response.
      operationId: listTestCasesCursorPaginated
      parameters:
      - name: projectKey
        in: query
        description: Jira project key filter
        schema:
          pattern: ([A-Z][A-Z_0-9]+)
          type: string
      - name: folderId
        in: query
        description: Folder ID filter
        schema:
          minimum: 1
          type: integer
          format: int64
      - name: limit
        in: query
        description: |
          Specifies the maximum number of results to return in a single call. The default value is 10, and the maximum value that can be requested is 1000.

          Note that the server may enforce a lower limit than requested, depending on resource availability or other internal constraints. If this happens, the result set may be truncated. Always check the limit value in the response to confirm how many results were actually returned.
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          format: int64
          default: 10
      - name: startAtId
        in: query
        description: Zero-indexed starting position for ID-based pagination.
        schema:
          minimum: 0
          type: integer
          format: int64
          default: 0
      - name: updatedAfter
        in: query
        description: 'Filter only entities updated after the given time. Format: yyyy-MM-dd''T''HH:mm:ss''Z'''
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: OK
          headers:
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/Access-Control-Allow-Headers'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/Access-Control-Allow-Methods'
            Access-Control-Allow-Origin:
