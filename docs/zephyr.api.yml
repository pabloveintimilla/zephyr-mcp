          $ref: '#/components/schemas/JiraComponent'
        priority:
          $ref: '#/components/schemas/PriorityLink'
        status:
          $ref: '#/components/schemas/StatusLink'
        folder:
          $ref: '#/components/schemas/FolderLink'
        owner:
          $ref: '#/components/schemas/JiraUserLink'
        customFields:
          $ref: '#/components/schemas/CustomFields'
    TestCaseVersionLinkList:
      allOf:
      - $ref: '#/components/schemas/PagedList'
      - properties:
          values:
            type: array
            description: A list of versions for a test case
            items:
              $ref: '#/components/schemas/TestCaseVersionLink'
    TestCaseVersionLink:
      example:
        id: 10002
        self: https://<api-base-url>/testcases/PROJ-T1/versions/1
      allOf:
      - $ref: '#/components/schemas/Link'
      - properties:
          id:
            $ref: '#/components/schemas/EntityId'
    TestScript:
      description: Response body when retrieving test scripts
      allOf:
      - $ref: '#/components/schemas/TestScriptInput'
      - properties:
          id:
            $ref: '#/components/schemas/EntityId'
    TestScriptInput:
      required:
      - text
      - type
      type: object
      properties:
        type:
          type: string
          description: |
            Test scripts can be written in plain text or BDD format. The BDD type supports
            remote execution on a build system via API plugin.

            Supported Keywords for BDD:
            Given, When, Then, And, But.

            For more information about BDD and Gherkin syntax, see:
            https://support.smartbear.com/zephyr/docs/en/test-cases/gherkin-behavior-driven-development--bdd-.html

            For Plain Text scripts, we support HTML fragments.
            To create a step-by-step test script, you should use the POST /testcases/{testCaseKey}/teststeps endpoint.
          example: plain
          enum:
          - plain
          - bdd
        text:
          minLength: 1
          type: string
          example: e.g. Attempt to login to the application
      description: Request body for creating test scripts
    TestStepsList:
      description: Response body when retrieving test steps
      allOf:
      - $ref: '#/components/schemas/PagedList'
      - properties:
          values:
            type: array
            description: The list of test steps
            items:
              $ref: '#/components/schemas/TestStepOutput'
    TestStepOutput:
      type: object
      properties:
        id:
          minimum: 1
          type: integer
          description: The ID of the test step.
          format: int64
          nullable: true
          example: 1
        inline:
          type: object
          properties:
            description:
              type: string
              description: The instruction to be followed
              nullable: true
              example: Attempt to login to the application
            testData:
              type: string
              description: Any test data required to perform the instruction (optional).
                The fields values provided can be interpolated into the description.
              nullable: true
              example: Username = SmartBear Password = weLoveAtlassian
            expectedResult:
              type: string
              description: The expected outcome of executing the instruction
              nullable: true
              example: Login succeeds, web-app redirects to the dashboard view
            customFields:
              $ref: '#/components/schemas/CustomFields'
            reflectRef:
              type: string
              description: The AI reference. Zephyr only feature
              nullable: true
              example: Not available yet
          nullable: true
        testCase:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/TestStepTestCaseOutput'
      description: An instruction to be followed as part of a step-by-step test script.
        The test step can have either an inline definition, or delegate execution
        to another test case. One of these options must be specified.
    TestStepTestCaseOutput:
      required:
      - testCaseKey
      allOf:
      - $ref: '#/components/schemas/Link'
      - properties:
          testCaseKey:
            pattern: (.+-T[0-9]+)
            type: string
            description: The key of the other test case that the test step should
              delegate execution to. This cannot be the parent test case.
            example: PROJ-T123
          parameters:
            type: array
            description: The list of parameters of the call to test step
            nullable: true
            items:
              $ref: '#/components/schemas/TestStepTestCaseParameters'
    TestStepTestCaseParameters:
      type: object
      properties:
        name:
          type: string
          description: Name of the parameter
          example: username
        type:
          type: string
          description: Type of the parameter. It is manual inputs for parameters or
            the default values.
          example: DEFAULT_VALUE
          enum:
          - MANUAL_INPUT
          - DEFAULT_VALUE
        value:
          type: string
          description: Value of the parameter
          example: admin
    TestStepsInput:
      required:
      - items
      - mode
      type: object
      properties:
        mode:
          type: string
          description: |
            Valid values: `"APPEND"`, `"OVERWRITE"`. <br> `OVERWRITE` deletes and recreates the test steps and associated custom field values using the provided input. Attachments for existing steps are kept, but those for missing steps are deleted permanently <br> `APPEND` only adds extra steps to your test steps.
          example: APPEND
        items:
          type: array
          description: The list of test steps. Each step should be an object containing
            `inline` or `testCase`. **They should only include one of these fields
            at a time**.
          items:
            $ref: '#/components/schemas/TestStep'
      description: Request body for creating test steps. A maximum of 100 test steps
        can be added in one request. To add more than 100 steps, you can submit multiple
        requests. The mode property allows you to specify whether you want to delete
        the current test steps and create a new list, or append more items to the
        end of the current list.
    TestStep:
      type: object
      properties:
        inline:
          type: object
          properties:
            description:
              type: string
              description: The instruction to be followed
              example: Attempt to login to the application
            testData:
              type: string
              description: Any test data required to perform the instruction (optional).
                The fields values provided can be interpolated into the description.
              example: Username = SmartBear Password = weLoveAtlassian
            expectedResult:
              type: string
              description: The expected outcome of executing the instruction
              example: Login succeeds, web-app redirects to the dashboard view
            customFields:
              $ref: '#/components/schemas/CustomFields'
            reflectRef:
              type: string
              description: The AI reference. Zephyr only feature
              example: Not available yet
        testCase:
          $ref: '#/components/schemas/TestStepTestCase'
      description: An instruction to be followed as part of a step-by-step test script.
        The test step can have either an inline definition, or delegate execution
        to another test case. One of these options must be specified.
    TestStepTestCase:
      required:
      - testCaseKey
      allOf:
      - $ref: '#/components/schemas/Link'
      - properties:
          testCaseKey:
            pattern: (.+-T[0-9]+)
            type: string
            description: The key of the other test case that the test step should
              delegate execution to. This cannot be the parent test case.
            example: PROJ-T123
          parameters:
            type: array
            description: The list of parameters of the call to test step
            items:
              $ref: '#/components/schemas/TestStepTestCaseParameters'
    AttachmentMetadataList:
      type: object
      properties:
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/AttachmentMetadata'
    AttachmentMetadata:
      type: object
      properties:
        id:
          type: integer
          description: Database ID of the attachment.
          format: int64
          example: 101
        name:
          type: string
          description: File name of the attachment.
          example: screenshot.png
    HasPermissionOutput:
      required:
      - hasPermission
      - projectId
      - resourceId
      type: object
      properties:
        hasPermission:
          type: boolean
        resourceId:
          type: integer
          format: int64
        projectId:
          type: integer
          format: int64
    TestCycleList:
      allOf:
      - $ref: '#/components/schemas/PagedList'
      - properties:
          values:
            type: array
            items:
              $ref: '#/components/schemas/TestCycle'
    TestCycle:
      required:
      - id
      - key
      - name
      - project
      - status
      type: object
      properties:
        id:
          $ref: '#/components/schemas/EntityId'
        key:
          pattern: ([A-Z][A-Z_0-9]+-R[0-9]+)
          type: string
          description: Unique key of the test cycle
          example: SA-R40
        name:
          pattern: ^(?!\s*$).+
          type: string
          description: Name of the Test Cycle
          example: Sprint 1 Regression Test Cycle
        project:
          $ref: '#/components/schemas/ProjectLink'
        jiraProjectVersion:
          $ref: '#/components/schemas/JiraProjectVersion'
        status:
          $ref: '#/components/schemas/StatusLink'
        folder:
          $ref: '#/components/schemas/FolderLink'
        description:
          $ref: '#/components/schemas/EntityDescription'
        plannedStartDate:
          $ref: '#/components/schemas/TestCycleUpdatePlannedStartDate'
        plannedEndDate:
          $ref: '#/components/schemas/TestCycleUpdatePlannedEndDate'
        owner:
          $ref: '#/components/schemas/JiraUserLink'
        customFields:
          $ref: '#/components/schemas/CustomFields'
        links:
          $ref: '#/components/schemas/TestCycleLinkList'
      description: Details of a test cycle
    JiraProjectVersion:
      description: ID and Link to fetch information about Jira Project version. Relates
        to 'Version' or 'Releases' in Jira projects.
      nullable: true
      example:
        id: 10000
        self: https://<jira-instance>.atlassian.net/rest/api/2/version/10000
      allOf:
      - $ref: '#/components/schemas/ResourceId'
      - $ref: '#/components/schemas/Link'
    EntityDescription:
      type: string
      description: Description outlining the scope.
      nullable: true
      example: Regression test cycle 1 to ensure no breaking changes
    TestCycleUpdatePlannedStartDate:
      type: string
      description: Planned start date of the test cycle. This field cannot be blank.
        Setting it as null or excluding it from the request will leave the field values
        unchanged. ISO 8601 Format (i.e., yyyy-MM-dd'T'HH:mm:ss'Z')
      format: date-time
      nullable: true
      example: 2018-05-19T13:15:13Z
    TestCycleUpdatePlannedEndDate:
      type: string
      description: The planned end date of the test cycle. This field cannot be blank.
        Setting it as null or excluding it from the request will leave the field values
        unchanged. ISO 8601 Format (i.e., yyyy-MM-dd'T'HH:mm:ss'Z')
      format: date-time
      nullable: true
      example: 2018-05-20T13:15:13Z
    TestCycleLinkList:
      description: Represents all links that a Test Cycle has.
      allOf:
      - $ref: '#/components/schemas/Link'
      - properties:
          issues:
            $ref: '#/components/schemas/IssueLinkList'
          webLinks:
            $ref: '#/components/schemas/WebLinkList'
          testPlans:
            $ref: '#/components/schemas/TestCycleTestPlanLinkList'
    TestCycleTestPlanLinkList:
      type: array
      description: A list of test plans linked to a test cycle
      items:
        $ref: '#/components/schemas/TestCycleTestPlanLink'
    TestCycleTestPlanLink:
      example:
        id: 1
        self: https://<api-base-url>/links/1
        type: RELATED
        testPlanId: 2
        target: https://<jira-instance>.atlassian.net/rest/api/2/testplan/123
      allOf:
      - properties:
          id:
            minimum: 1
            type: integer
            description: The ID that represents the link between the Test Cycle and
              the Test Plan.
            format: int64
            example: 1
          self:
            type: string
            description: The Zephyr REST API endpoint relative to the link between
              the entity and the Jira issue.
            format: uri
          testPlanId:
            type: integer
            description: The ID of the test plan
            format: int64
          type:
            type: string
            description: The link type
            enum:
            - COVERAGE
            - BLOCKS
            - RELATED
          target:
            type: string
            description: The Zephyr REST API endpoint to get the full representation
              of the test plan
            format: uri
    QueryParameterValidationError:
      required:
