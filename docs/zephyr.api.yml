    InvalidPayloadError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: Invalid Payload
      description: The request body is not valid JSON.
    FolderNotFoundBadRequestError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: Folder 99999 not found
      description: The folderId in the body refers to a folder that does not exist.
    FolderWrongTypeError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: Folder 1 is not a TEST_CYCLE folder
      description: The folderId refers to a folder that is not a TEST_CYCLE folder.
    UnknownCustomFieldError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: The custom field 'NoSuchCF' was not found
      description: A custom field name in the body does not exist for the project.
    CustomFieldWrongTypeError:
