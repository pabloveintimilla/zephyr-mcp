components:
  schemas:
    TestCaseList:
      allOf:
      - $ref: '#/components/schemas/PagedList'
      - properties:
          values:
            type: array
            items:
              $ref: '#/components/schemas/TestCase'
    PagedList:
      required:
      - maxResults
      - startAt
      type: object
      properties:
        next:
          type: string
          description: URL to the next page of results, or null if there are no more
            results.
          format: uri
          nullable: true
        startAt:
          minimum: 0
          type: integer
          description: Indicates the index of the first item returned in the page
            of results.
          format: int64
        maxResults:
          minimum: 1
          type: integer
          description: Indicates the maximum number of results in this response. Note
            that the server may enforce a lower limit than requested, depending on
            resource availability or other internal constraints.
          format: int64
          example: 1
        total:
          minimum: 0
          type: integer
          description: Indicates the total number of items available across all pages.
          format: int64
          example: 1
        isLast:
          type: boolean
          description: Indicates if this is the last page of results.
          example: true
    TestCase:
      required:
      - id
      - key
      - name
      - priority
      - project
      - status
      type: object
      properties:
        id:
          $ref: '#/components/schemas/EntityId'
        key:
          pattern: .+-T[0-9]+
          type: string
          description: The test case key
          example: SA-T10
        name:
          $ref: '#/components/schemas/EntityName'
        project:
          $ref: '#/components/schemas/ProjectLink'
        createdOn:
          $ref: '#/components/schemas/CreatedOn'
        objective:
          $ref: '#/components/schemas/Objective'
        precondition:
          $ref: '#/components/schemas/Precondition'
        estimatedTime:
          minimum: 0
          type: integer
          description: Estimated duration in milliseconds.
          format: int64
          nullable: true
          example: 138000
        labels:
          $ref: '#/components/schemas/Labels'
        component:
          $ref: '#/components/schemas/JiraComponent'
        priority:
          $ref: '#/components/schemas/PriorityLink'
        status:
          $ref: '#/components/schemas/StatusLink'
        folder:
          $ref: '#/components/schemas/FolderLink'
        owner:
          $ref: '#/components/schemas/JiraUserLink'
        testScript:
          $ref: '#/components/schemas/TestCaseTestScriptLink'
        customFields:
          $ref: '#/components/schemas/CustomFields'
        links:
          $ref: '#/components/schemas/TestCaseLinkList'
    EntityId:
      minimum: 1
      type: integer
      description: The ID of the entity
      format: int64
      example: 1
    EntityName:
      maxLength: 255
      minLength: 1
      pattern: ^(?!\\s*$).+
      type: string
      example: Check axial pump
    ProjectLink:
      description: ID and link relative to Zephyr project.
      example:
        id: 10005
        self: https://<api-base-url>/projects/10005
      allOf:
      - $ref: '#/components/schemas/ResourceId'
      - $ref: '#/components/schemas/Link'
    ResourceId:
      required:
      - id
      type: object
      properties:
        id:
          $ref: '#/components/schemas/EntityId'
    Link:
      type: object
      properties:
        self:
          type: string
          description: The REST API endpoint to get more resource details.
          format: uri
    CreatedOn:
      type: string
      description: |
        Data and time test case was created. Format: yyyy-MM-dd'T'HH:mm:ss'Z'. This field is read-only, cannot be updated.
      format: date-time
      example: 2018-05-15T13:15:13Z
    Objective:
      type: string
      description: A description of the objective.
      nullable: true
      example: To ensure the axial pump can be enabled
    Precondition:
      type: string
      description: Any conditions that need to be met.
      nullable: true
      example: Latest version of the axial pump available
    Labels:
      maxItems: 50
      type: array
      description: Array of labels associated to this entity.
      example:
      - Regression
      - Performance
      - Automated
      items:
        type: string
    JiraComponent:
      description: ID and link to the Jira component resource.
      nullable: true
      example:
        id: 10001
        self: https://<jira-instance>.atlassian.net/rest/api/2/component/10001
      allOf:
      - $ref: '#/components/schemas/ResourceId'
      - $ref: '#/components/schemas/Link'
    PriorityLink:
      description: ID and link to the priority resource.
      example:
        id: 10002
        self: https://<api-base-url>/priorities/10002
      allOf:
      - $ref: '#/components/schemas/ResourceId'
      - $ref: '#/components/schemas/Link'
    StatusLink:
      description: ID and link to the status resource.
      example:
        id: 10000
        self: https://<api-base-url>/statuses/10000
      allOf:
      - $ref: '#/components/schemas/ResourceId'
      - $ref: '#/components/schemas/Link'
    FolderLink:
      description: ID and link to the folder resource.
      nullable: true
      example:
        id: 100006
        self: https://<api-base-url>/folders/10006
      allOf:
      - $ref: '#/components/schemas/ResourceId'
      - $ref: '#/components/schemas/Link'
    JiraUserLink:
      required:
      - accountId
      properties:
        accountId:
          $ref: '#/components/schemas/JiraUserAccountId'
        self:
          type: string
          description: The Jira REST API endpoint to get the full representation of
            the Jira user.
          format: uri
      nullable: true
      example:
        self: https://<jira-instance>.atlassian.net/rest/api/2/user?accountId=5b10a2844c20165700ede21g
        accountId: 5b10a2844c20165700ede21g
    JiraUserAccountId:
      pattern: ^[-:a-zA-Z0-9]{1,128}$
      type: string
      description: Atlassian Account ID of the Jira user.
      nullable: true
      example: 5b10a2844c20165700ede21g
    TestCaseTestScriptLink:
      example:
        self: https://<api-base-url>/testCases/PROJ-T1/testscript
      allOf:
      - $ref: '#/components/schemas/Link'
    CustomFields:
      type: object
      additionalProperties: {}
      description: |
        Multi-line text fields support HTML and should denote new lines with the \<br\> tag.
        Dates should be in the format 'yyyy-MM-dd'.
        Users should have values of Jira User Account IDs.
      example:
        Build Number: 20
        Release Date: 2020-01-01T00:00:00Z
        Pre-Condition(s): User should have logged in. <br> User should have navigated
          to the administration panel.
        Implemented: false
        Category:
        - Performance
        - Regression
        Tester: fa2e582e-5e15-521e-92e3-47e6ca2e7256
    TestCaseLinkList:
      description: A list of links for this test case.
      allOf:
      - $ref: '#/components/schemas/Link'
      - properties:
          issues:
