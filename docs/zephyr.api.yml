paths:
  /testcases:
    get:
      tags:
      - Test Cases
      summary: Get test cases
      description: |
        Retrieves all test cases. Query parameters can be used to filter the results. If the user who is preforming the API call has access to more than 1000 projects, the `projectKey` query parameter is mandatory.
      operationId: listTestCases
      parameters:
      - name: projectKey
        in: query
        description: Jira project key filter
        schema:
          pattern: ([A-Z][A-Z_0-9]+)
          type: string
      - name: folderId
        in: query
        description: Folder ID filter
        schema:
          minimum: 1
          type: integer
          format: int64
      - name: maxResults
        in: query
        description: |
          Specifies the maximum number of results to return in a single call. The default value is 10, and the maximum value that can be requested is 1000.

          Note that the server may enforce a lower limit than requested, depending on resource availability or other internal constraints. If this happens, the result set may be truncated. Always check the maxResults value in the response to confirm how many results were actually returned.
        schema:
          minimum: 1
          type: integer
          format: int64
          default: 10
      - name: startAt
        in: query
        description: Zero-indexed starting position. Should be a multiple of maxResults.
        schema:
          maximum: 1000000
          minimum: 0
          type: integer
          format: int64
          default: 0
      responses:
        '200':
          description: OK
          headers:
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/Access-Control-Allow-Headers'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/Access-Control-Allow-Methods'
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/Access-Control-Allow-Origin'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestCaseList'
        '401':
          description: Unauthorized. The request is missing valid authentication credentials.
          headers:
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/Access-Control-Allow-Headers'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/Access-Control-Allow-Methods'
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/Access-Control-Allow-Origin'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '500':
          description: Internal Server Error. An unexpected error occurred while processing
            the request.
          headers:
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/Access-Control-Allow-Headers'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/Access-Control-Allow-Methods'
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/Access-Control-Allow-Origin'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
        default:
          description: An error has occurred. Please check the code and the error
            message.
          headers:
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/Access-Control-Allow-Headers'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/Access-Control-Allow-Methods'
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/Access-Control-Allow-Origin'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-amazon-integration:
        x-amazon-apigateway-request-validator: basic
        x-amazon-apigateway-integration:
          httpMethod: post
          type: aws_proxy
          uri:
            Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations
        security:
        - AccessToken: []
    post:
      tags:
      - Test Cases
      summary: Create test case
      description: |
        Creates a test case. Fields `priorityName` and `statusName` will be set to default values if not informed. Default values are usually ?Normal? for `priorityName` and ?Draft? for `statusName`. All required test case custom fields should be present in the request. Note: when a test case is created, a single empty test step is automatically added to it. To define your own test steps, use the `POST /testcases/{testCaseKey}/teststeps` endpoint after creation using `OVERWRITE` mode.
