          example: Custom field CF 2 cycle requires a number value
      description: |
        A custom field value has the wrong type for the field definition. The message names the field and the expected type, e.g. "requires a number value", "requires a string value", "requires a boolean value", "requires a string which is in the format yyyy-MM-dd", or "requires a list".
    InvalidCustomFieldOptionError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: No Custom field option for the name NopeOption
      description: A choice custom field value references an option name that does
        not exist.
    RequiredCustomFieldsMissingError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: 'Required custom fields were not provided for custom fields: Req
            Text CF'
      description: The project has required custom fields but the request omitted
        them.
    RequiredCustomFieldsNotProvidedError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: 'When custom fields are present in the request body for this endpoint,
            then all the required custom fields should have value. The required custom
            fields expected to be present in the request body are: Req Text CF'
      description: Custom fields were provided but not all required ones are present.
    RequiredCustomFieldsNoValueError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: 'All the required custom fields should have value. These required
            custom fields does not have a value: Req Text CF'
      description: A required custom field was provided with a null or empty value.
    MultiChoiceCustomFieldEmptyError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: The following multi choice custom fields are incorrectly being
            set:'Req Multi CF'
      description: A required multi-choice custom field was set to an empty collection.
    InsufficientPermissionError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 403
        message:
          type: string
          example: 'You do not have the following required permissions: Create Test
            Cycle'
      description: The caller lacks a required Zephyr permission (when the project's
        permission system is enabled).
    CustomFieldsForbiddenError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 403
        message:
          type: string
          example: Some custom fields couldn't be found
      description: Referenced custom fields do not belong to the current client.
    StatusNameNotFoundError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 404
        message:
          type: string
          example: Test Run Status with the name 'NoSuchStatusXYZ' was not found on
            projectId 2
      description: The statusName does not exist for the project.
    DefaultStatusNotFoundError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 404
        message:
          type: string
          example: The default Test Run Status of the projectId 2 was not found
      description: No statusName was supplied and the project has no default status
        of the relevant group.
    JiraEntityNotFoundError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 404
        message:
          type: string
          example: 'Some Jira entities do not exist or you don''t have access to them:
            Project Version id [99999]'
      description: A referenced Jira entity (e.g. jiraProjectVersion) does not exist
        or is not accessible.
    CursorPagedTestCycleList:
      allOf:
      - $ref: '#/components/schemas/CursorPagedList'
      - properties:
          values:
            type: array
            items:
              $ref: '#/components/schemas/TestCycle'
    TestCycleIdOrKeyPatternError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: 'getTestCycle.testCycleIdOrKey: must match "([0-9]+)|([A-Z][A-Z_0-9]+-R[0-9]+)"'
      description: The `testCycleIdOrKey` path parameter does not match the required
        pattern
    TestCycleNotFoundError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 404
        message:
          type: string
          example: Test run with id EP-R99999 was not found
      description: No test cycle exists with the given id or key.
    UpdateTestCycleInput:
      required:
      - id
      - key
      - name
      - project
      - status
      type: object
      properties:
        id:
          $ref: '#/components/schemas/EntityId'
        key:
          pattern: ([A-Z][A-Z_0-9]+-R[0-9]+)
          type: string
          description: Unique key of the test cycle
          example: SA-R40
        name:
          $ref: '#/components/schemas/EntityName'
        project:
          $ref: '#/components/schemas/ProjectLink'
        jiraProjectVersion:
          $ref: '#/components/schemas/JiraProjectVersion'
        status:
          $ref: '#/components/schemas/StatusLink'
        folder:
          $ref: '#/components/schemas/FolderLink'
        description:
          $ref: '#/components/schemas/EntityDescription'
        plannedStartDate:
          $ref: '#/components/schemas/TestCycleUpdatePlannedStartDate'
        plannedEndDate:
          $ref: '#/components/schemas/TestCycleUpdatePlannedEndDate'
        owner:
          $ref: '#/components/schemas/JiraUserLink'
        customFields:
          $ref: '#/components/schemas/CustomFields'
    StatusIdNotFoundError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: Status '999999' not found
      description: The status id does not exist for the project.
    MissingExpectedCustomFieldsError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: 'When custom fields are present in the request body for this endpoint,
            then all custom fields should be present as well. If you wish to leave
            any of them blank, please set them null if they are not required custom
            fields. The custom fields expected to be present in the request body are:
            CF 2 cycle'
      description: On update, custom fields were provided but not all of the project's
        custom fields are present in the request.
    DuplicateIssueLinkError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: Issue 10100 already has a RELATED link to the test cycle
      description: An issue link of the requested type already exists between the
        test cycle and the Jira issue.
    WebLinkTestCycleNotFoundError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: Test Cycle 'EP-R99999' Not Found
      description: No test cycle exists with the given id or key.
    UnsupportedHasPermissionMethodError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: Attachment entity type testcycle is not supported
      description: The `method` query parameter is not one of the supported HTTP methods
        (GET, POST, PUT, DELETE) or is empty.
    BackendUnauthorizedError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 401
        message:
          type: string
          example: '[HTTP Status 401] Error calling cloud backend API'
      description: The caller lacks the permission required for the requested method.
        The backend returned 401
    TestPlanList:
      allOf:
      - $ref: '#/components/schemas/PagedList'
      - properties:
          values:
            type: array
            items:
              $ref: '#/components/schemas/TestPlan'
    TestPlan:
      required:
      - id
      - key
      - name
      - project
      - status
      type: object
      properties:
        id:
          $ref: '#/components/schemas/EntityId'
        key:
          pattern: .+-P[0-9]+
          type: string
          description: Key of the test plan
          example: SA-P10
        name:
          $ref: '#/components/schemas/EntityName'
        objective:
          $ref: '#/components/schemas/Objective'
        project:
          $ref: '#/components/schemas/ProjectLink'
        status:
          $ref: '#/components/schemas/StatusLink'
        folder:
          $ref: '#/components/schemas/FolderLink'
        owner:
          $ref: '#/components/schemas/JiraUserLink'
        customFields:
          $ref: '#/components/schemas/CustomFields'
        labels:
          $ref: '#/components/schemas/Labels'
        links:
          properties:
            webLinks:
              $ref: '#/components/schemas/WebLinkList'
            issues:
              $ref: '#/components/schemas/IssueLinkList'
            testCycles:
              $ref: '#/components/schemas/TestPlanCycleLinkList'
    TestPlanCycleLinkList:
      type: array
      description: A list of test cycle links for a test plan
      items:
        $ref: '#/components/schemas/TestPlanTestCycleLink'
    TestPlanTestCycleLink:
      description: ID and link to a test cycle associated with a test plan.
      allOf:
      - $ref: '#/components/schemas/ResourceId'
      - $ref: '#/components/schemas/Link'
      - properties:
          testCycleId:
            $ref: '#/components/schemas/EntityId'
          type:
            type: string
            description: The link type
            enum:
            - COVERAGE
            - BLOCKS
            - RELATED
          target:
            type: string
            description: The test cycle resource
        example:
          id: 1
          self: https://<api-base-url>/links/1
          type: RELATED
          testCycleId: 2
          target: https://<api-base-url>/testcycles/2
    TestPlanInput:
      required:
      - name
      - projectKey
      type: object
      properties:
        projectKey:
          $ref: '#/components/schemas/ProjectKey'
        name:
          $ref: '#/components/schemas/EntityName'
        objective:
          $ref: '#/components/schemas/Objective'
        folderId:
          minimum: 1
          type: integer
          description: ID of a folder to place the entity within.
          format: int64
        statusName:
          $ref: '#/components/schemas/StatusName'
        ownerId:
          $ref: '#/components/schemas/JiraUserAccountId'
        labels:
          $ref: '#/components/schemas/Labels'
        customFields:
          $ref: '#/components/schemas/CustomFields'
    CursorPagedTestPlanList:
      allOf:
      - $ref: '#/components/schemas/CursorPagedList'
      - properties:
          values:
            type: array
            items:
              $ref: '#/components/schemas/TestPlan'
    WebLinkInputWithMandatoryDescription:
      allOf:
      - $ref: '#/components/schemas/WebLinkInput'
      - required:
        - description
        - url
    TestPlanTestCycleLinkInput:
      required:
      - testCycleIdOrKey
      type: object
      properties:
        testCycleIdOrKey:
          pattern: ([0-9]+)|([A-Z][A-Z_0-9]+-R[0-9]+)
          type: string
          description: The ID or key of the test cycle.
    TestExecutionList:
      allOf:
      - $ref: '#/components/schemas/PagedList'
      - properties:
          values:
            type: array
            items:
              $ref: '#/components/schemas/TestExecution'
    TestExecution:
      required:
      - id
      - project
      - testCase
      - testExecutionStatus
      type: object
      properties:
        id:
          $ref: '#/components/schemas/EntityId'
        key:
          pattern: .+-E[0-9]+
          type: string
          description: Test execution key
          example: SA-E10
        project:
          $ref: '#/components/schemas/ProjectLink'
        testCase:
          $ref: '#/components/schemas/TestCaseVersionLink'
        environment:
          $ref: '#/components/schemas/EnvironmentLink'
        jiraProjectVersion:
          $ref: '#/components/schemas/JiraProjectVersion'
        testExecutionStatus:
          $ref: '#/components/schemas/StatusLink'
        actualEndDate:
          $ref: '#/components/schemas/ActualEndDate'
        estimatedTime:
          minimum: 0
          type: integer
          description: Estimated duration in milliseconds.
          format: int64
          nullable: true
          example: 138000
        executionTime:
          minimum: 0
          type: integer
          description: Actual test execution time in milliseconds.
          format: int64
          nullable: true
          example: 120000
        executedById:
          $ref: '#/components/schemas/JiraUserAccountId'
        assignedToId:
          $ref: '#/components/schemas/JiraUserAccountId'
        comment:
          $ref: '#/components/schemas/Comment'
        automated:
          type: boolean
          description: Indicates if the test execution was done manually or not.
        testCycle:
          $ref: '#/components/schemas/TestCycleLink'
        customFields:
          $ref: '#/components/schemas/CustomFields'
        links:
          $ref: '#/components/schemas/TestExecutionLinkList'
    EnvironmentLink:
      description: ID and link to the environment resource.
      nullable: true
      example:
        id: 10005
        self: https://example.com/rest/api/v2/environment/10005
      allOf:
      - $ref: '#/components/schemas/ResourceId'
      - $ref: '#/components/schemas/Link'
    ActualEndDate:
      type: string
      description: 'The actual end date of the test cycle. Format: yyyy-MM-dd''T''HH:mm:ss''Z'''
      format: date-time
      example: 2018-05-20T13:15:13Z
    Comment:
      type: string
      description: Comment added against overall test case execution.
      nullable: true
      example: Test failed user could not login
    TestCycleLink:
      nullable: true
      example:
        id: 10010
        self: https://<api-base-url>/testcycles/10010
      allOf:
      - $ref: '#/components/schemas/Link'
      - properties:
          id:
            $ref: '#/components/schemas/EntityId'
    TestExecutionLinkList:
      allOf:
      - $ref: '#/components/schemas/Link'
      - properties:
          issues:
            $ref: '#/components/schemas/IssueLinkList'
    TestExecutionInput:
      required:
      - projectKey
      - statusName
      - testCaseKey
      - testCycleKey
      type: object
      properties:
        projectKey:
          pattern: ([A-Z][A-Z_0-9]+)
          type: string
          description: Jira project key.
          example: TIS
        testCaseKey:
          pattern: (.+-T[0-9]+)
          type: string
          description: 'Key of test case the execution applies to. NOTE: Test cases
            with call to test, parameters and test data are not supported.'
          example: SA-T10
        testCycleKey:
          pattern: ([A-Z][A-Z_0-9]+-R[0-9]+)
          type: string
          description: Key of test cycle the execution applies to.
          example: SA-R10
        statusName:
          $ref: '#/components/schemas/StatusName'
        testScriptResults:
          type: array
          items:
            $ref: '#/components/schemas/TestScriptResultInput'
        environmentName:
          type: string
          description: Environment assigned to the test case.
          example: Chrome Latest Version
        actualEndDate:
          $ref: '#/components/schemas/ActualEndDate'
        executionTime:
          minimum: 0
          type: integer
          description: Actual test execution time in milliseconds.
          format: int64
          example: 120000
        executedById:
          $ref: '#/components/schemas/JiraUserAccountId'
        assignedToId:
          $ref: '#/components/schemas/JiraUserAccountId'
        comment:
          $ref: '#/components/schemas/Comment'
        customFields:
          $ref: '#/components/schemas/CustomFields'
    TestScriptResultInput:
      required:
      - statusName
      type: object
      properties:
        statusName:
          $ref: '#/components/schemas/StatusName'
        actualEndDate:
          $ref: '#/components/schemas/ActualEndDate'
        actualResult:
          type: string
          description: free text field to provide more info on result of step execution.
          example: User logged in successfully
    CursorPagedTestExecutionList:
      allOf:
      - $ref: '#/components/schemas/CursorPagedList'
      - properties:
          values:
            type: array
            items:
              $ref: '#/components/schemas/TestExecution'
    TestExecutionUpdate:
      type: object
      properties:
        statusName:
          $ref: '#/components/schemas/StatusName'
        environmentName:
          type: string
          description: Environment assigned to the test case.
          example: Chrome Latest Version
        actualEndDate:
          $ref: '#/components/schemas/ActualEndDate'
        executionTime:
          minimum: 0
          type: integer
          description: Actual test execution time in milliseconds.
          format: int64
          example: 120000
        executedById:
          $ref: '#/components/schemas/JiraUserAccountId'
        assignedToId:
          $ref: '#/components/schemas/JiraUserAccountId'
        comment:
          $ref: '#/components/schemas/Comment'
    TestExecutionTestStepsList:
      description: Response body when retrieving test steps for a test execution
      allOf:
      - $ref: '#/components/schemas/PagedList'
      - properties:
          values:
            type: array
            description: The list of test steps
            items:
              $ref: '#/components/schemas/TestExecutionStep'
    TestExecutionStep:
      type: object
      properties:
        id:
          type: integer
          description: The id of the test step (test script result)
          format: int64
          nullable: true
          example: 12345
        inline:
          type: object
          properties:
            description:
              type: string
              description: The instruction to be followed
              nullable: true
              example: Attempt to login to the application
            testData:
              type: string
              description: Any test data required to perform the instruction (optional).
                The fields values provided can be interpolated into the description.
              nullable: true
              example: Username = SmartBear Password = weLoveAtlassian
            expectedResult:
              type: string
              description: The expected outcome of executing the instruction
              nullable: true
              example: Login succeeds, web-app redirects to the dashboard view
            actualResult:
              type: string
              description: The actual outcome of executing the instruction
              nullable: true
              example: Login succeeded, web-app redirected to the dashboard view
            testDataRowNumber:
              type: integer
              description: The id of the test data row
              nullable: true
              example: 1
            reflectRef:
              type: string
              description: The AI reference. Zephyr only feature
              nullable: true
              example: Not available yet
            status:
              $ref: '#/components/schemas/StatusLink'
      description: Inline test step
    TestStepsUpdate:
      type: object
      properties:
        steps:
          type: array
          items:
            $ref: '#/components/schemas/TestStepUpdate'
    TestStepUpdate:
      type: object
      properties:
        actualResult:
          $ref: '#/components/schemas/ActualResult'
        statusName:
          $ref: '#/components/schemas/StatusName'
    ActualResult:
      type: string
      description: The actual result.
      example: User logged in successfully
    TestResultNotFoundOrUserAccessError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 404
        message:
          type: string
          example: Test execution does not exist or you do not have access to it
    TestExecutionImmutableError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 409
        message:
          type: string
          example: The test execution you are trying to update is immutable. Please
            check if there's a more recent execution for this test case
    TestStepNumberMismatchUnprocessableError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 422
        message:
          type: string
          example: Sent steps are not matching test execution steps
    TestStepTestDataUnprocessableError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 422
        message:
          type: string
          example: Update of test execution containing test data is not supported
    ProjectList:
      allOf:
      - $ref: '#/components/schemas/PagedList'
      - properties:
          values:
            type: array
            items:
              $ref: '#/components/schemas/Project'
    Project:
      required:
      - enabled
      - id
      - jiraProjectId
      - key
      type: object
      properties:
        id:
          type: integer
          description: The ID of the project in Zephyr.
          format: int64
        jiraProjectId:
          type: integer
          description: The ID of the project in Jira.
          format: int64
        key:
          type: string
        enabled:
          type: boolean
          description: Indicates whether the project has Zephyr enabled on it.
    FolderType:
      type: string
      description: 'Valid values: `"TEST_CASE"`, `"TEST_PLAN"`, `"TEST_CYCLE"`'
    FolderList:
      allOf:
      - $ref: '#/components/schemas/PagedList'
      - properties:
          values:
            type: array
            items:
              $ref: '#/components/schemas/Folder'
    Folder:
      required:
      - folderType
      - id
      - index
      - name
      - parentId
      type: object
      properties:
        id:
          $ref: '#/components/schemas/EntityId'
        parentId:
          $ref: '#/components/schemas/EntityId'
        name:
          $ref: '#/components/schemas/EntityName'
        index:
          $ref: '#/components/schemas/Index'
        folderType:
          $ref: '#/components/schemas/FolderType'
        project:
          $ref: '#/components/schemas/ProjectLink'
    Index:
      minimum: 0
      type: integer
      format: int64
      example: 1
    FolderInput:
      required:
      - folderType
      - name
      - projectKey
      type: object
      properties:
        parentId:
          minimum: 1
          type: integer
          description: Folder ID of the parent folder. Must be `null` for root folders.
          format: int64
        name:
          maxLength: 255
          minLength: 1
          type: string
          description: Folder name. Folder name must not contain `/` and `\` characters.
        projectKey:
          $ref: '#/components/schemas/ProjectKey'
        folderType:
          $ref: '#/components/schemas/FolderType'
    PriorityList:
      allOf:
      - $ref: '#/components/schemas/PagedList'
      - properties:
          values:
            type: array
            items:
              $ref: '#/components/schemas/Priority'
    Priority:
      example:
        id: 1
        project:
          id: 10005
          self: https://<api-base-url>/projects/10005
        name: Critical
        description: Top level priority
        index: 1
        color: '#FFF'
        default: false
      allOf:
      - $ref: '#/components/schemas/OptionValue'
      - properties:
          color:
            $ref: '#/components/schemas/EntityColor'
          default:
            type: boolean
            default: false
    OptionValue:
      required:
      - id
      - index
      - name
      - project
      type: object
      properties:
        id:
          $ref: '#/components/schemas/EntityId'
        project:
          $ref: '#/components/schemas/ProjectLink'
        name:
          $ref: '#/components/schemas/EntityName'
        description:
          $ref: '#/components/schemas/EntityDescription'
        index:
          $ref: '#/components/schemas/Index'
    EntityColor:
      pattern: '#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})'
      type: string
      description: A color in hexadecimal format
      example: '#FFF or #FFFFFF'
    CreatePriorityInput:
      required:
      - name
      - projectKey
      type: object
      properties:
        projectKey:
          $ref: '#/components/schemas/ProjectKey'
        name:
          $ref: '#/components/schemas/PriorityName'
        description:
          $ref: '#/components/schemas/PriorityDescription'
        color:
          $ref: '#/components/schemas/EntityColor'
    PriorityDescription:
      maxLength: 255
      minLength: 1
      type: string
      description: The priority description.
      example: Top level priority
    PriorityNotFoundOrUserAccessError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 404
        message:
          type: string
          example: Priority '1' does not exist or you do not have access to it
    UpdatePriorityInput:
      required:
      - default
      - id
      - index
      - name
      - project
      type: object
      properties:
        id:
          $ref: '#/components/schemas/EntityId'
        project:
          $ref: '#/components/schemas/ProjectLink'
        name:
          $ref: '#/components/schemas/PriorityName'
        description:
          $ref: '#/components/schemas/PriorityDescription'
        index:
          $ref: '#/components/schemas/Index'
        default:
          type: boolean
        color:
          $ref: '#/components/schemas/EntityColor'
    StatusList:
      allOf:
      - $ref: '#/components/schemas/PagedList'
      - properties:
          values:
            type: array
            items:
              $ref: '#/components/schemas/Status'
    Status:
      allOf:
      - $ref: '#/components/schemas/OptionValue'
      - properties:
          color:
            type: string
