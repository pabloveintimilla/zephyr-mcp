      description: The folderId filter refers to a folder that does not exist.
    InaccessibleOrMissingDataError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 404
        message:
          type: string
          example: 'Some of the requested data is inaccessible, or does not exist:
            Test Cycle EP-R3'
      description: The referenced resource does not exist, or the caller does not
        have access to its project.
    DisabledProjectError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 404
        message:
          type: string
          example: 'Some of the requested data belongs to a disabled project, or a
            project that does not exist: Test Cycle EP-R3'
      description: The referenced resource belongs to a disabled project, or a project
        that does not exist.
    BackendCallError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 500
