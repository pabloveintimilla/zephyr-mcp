  /testplans/{testPlanIdOrKey}/attachments/{fileName}:
    put:
      tags:
      - Test Plans
      summary: Upload test plan attachment
      description: |
        Uploads a file and attaches it to a test plan.
        Send the file as the raw request body. The attachment's display name is taken from the `fileName` path parameter.
        Maximum file size is 1 GB per attachment.
        File name must contain 1 to 255 characters. It cannot contain `/`, `\`, `..`, or
        null bytes. URL-encode any special characters (for example, spaces
        become `%20`).

        Uploading the same `fileName` again creates an additional attachment for test cycle;
        existing attachments are not replaced.
      operationId: createTestPlanAttachment
      parameters:
      - name: testPlanIdOrKey
        in: path
        description: The ID or key of the test plan. Test plan keys are of the format
          [A-Z]+-P[0-9]+
        required: true
        schema:
          pattern: ([0-9]+)|(.+-P[0-9]+)
          type: string
      - name: fileName
        in: path
        description: |
          The name of the file being uploaded, including its extension (for example, `screenshot.png`).
          This is used as the attachment's display name. URL-encode any special characters and keep
          the name to 255 characters or fewer.
        required: true
        schema:
          maxLength: 255
          minLength: 1
          type: string
      requestBody:
        description: The contents of the file to attach.
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
        required: true
      responses:
        '200':
          description: OK
          headers:
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/Access-Control-Allow-Headers'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/Access-Control-Allow-Methods'
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/Access-Control-Allow-Origin'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized. The request is missing valid authentication credentials.
          headers:
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/Access-Control-Allow-Headers'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/Access-Control-Allow-Methods'
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/Access-Control-Allow-Origin'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
