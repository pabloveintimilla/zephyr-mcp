          $ref: '#/components/schemas/ProjectKey'
        name:
          $ref: '#/components/schemas/EntityName'
        description:
          $ref: '#/components/schemas/EntityDescription'
        plannedStartDate:
          $ref: '#/components/schemas/PlannedStartDate'
        plannedEndDate:
          $ref: '#/components/schemas/PlannedEndDate'
        jiraProjectVersion:
          $ref: '#/components/schemas/JiraProjectVersionId'
        statusName:
          $ref: '#/components/schemas/StatusName'
        folderId:
          minimum: 1
          type: integer
          description: ID of a folder to place the entity within.
          format: int64
        ownerId:
          $ref: '#/components/schemas/JiraUserAccountId'
        customFields:
          $ref: '#/components/schemas/CustomFields'
    PlannedStartDate:
      type: string
      description: 'Planned start date of the test cycle. Format: yyyy-MM-dd''T''HH:mm:ss''Z'''
      format: date-time
      example: 2018-05-19T13:15:13Z
    PlannedEndDate:
      type: string
      description: 'The planned end date of the test cycle. Format: yyyy-MM-dd''T''HH:mm:ss''Z'''
      format: date-time
      example: 2018-05-20T13:15:13Z
    JiraProjectVersionId:
      minimum: 1
      type: integer
      description: Jira Project Version ID. Relates to 'Version' or 'Releases' in
        Jira projects.
      format: int64
      example: 10000
    RequestBodyValidationError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: 'createTestCycle.name: must not be null'
      description: A request body field failed validation at the API layer (required
        field missing, pattern mismatch, size, or numeric bound).
    InvalidFieldFormatError:
      required:
      - errorCode
      - message
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: 'Invalid format: Cannot deserialize value of type java.time.OffsetDateTime
            from String "not-a-date"'
      description: A request body field has the wrong type or format (for example
