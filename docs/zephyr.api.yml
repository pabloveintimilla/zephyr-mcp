      description: A segment of the bearer token is not valid base64.
    MalformedTokenJsonError:
      required:
      - error
      type: object
      properties:
        error:
          type: string
          example: The string '{...}' doesn't have a valid JSON format.
      description: A decoded segment of the bearer token is not valid JSON.
    InvalidJwtError:
      required:
      - error
      type: object
      properties:
