        existing attachments are not replaced.

        `testExecutionStepId` is the numeric ID of
        the step within the test execution. Retrieve it from
        `GET /testexecutions/{testExecutionIdOrKey}/teststeps`.
      operationId: createTestExecutionTestStepAttachment
      parameters:
      - name: testExecutionIdOrKey
        in: path
        description: The ID or key of the test execution. Test execution keys are
          of the format [A-Z]+-E[0-9]+
        required: true
        schema:
          pattern: ([0-9]+)|(.+-E[0-9]+)
          type: string
      - name: testExecutionStepId
        in: path
        description: The ID of the step within the test execution.
        required: true
        schema:
          minimum: 1
          type: integer
          format: int64
      - name: fileName
        in: path
        description: |
          The name of the file being uploaded, including its extension (for example, `screenshot.png`).
          This is used as the attachment's display name. URL-encode any special characters and keep
          the name to 255 characters or fewer.
        required: true
        schema:
          maxLength: 255
          minLength: 1
